<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>studio — sign in</title>
<style>
  :root {
    --fg: #0f172a;
    --muted: #64748b;
    --accent: #6366f1;
    --bg: #fafafa;
    --border: #e2e8f0;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  body { margin: 0; background: var(--bg); color: var(--fg); min-height: 100dvh; display: grid; place-items: center; }
  main { width: min(560px, 92vw); padding: 2rem; }
  h1 { font-size: 1.75rem; margin: 0 0 .25rem; letter-spacing: -0.02em; }
  h2 { font-size: 1.1rem; margin: 1.5rem 0 .75rem; }
  p.lede { color: var(--muted); margin: 0 0 1.5rem; }
  label { font-size: .85rem; color: var(--muted); }
  form { display: grid; gap: .5rem; }
  input[type=email], input[type=text] { padding: .75rem .9rem; border: 1px solid var(--border); border-radius: .5rem; font-size: 1rem; background: white; }
  input[type=email]:focus, input[type=text]:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button { padding: .75rem; border: 0; background: var(--fg); color: white; border-radius: .5rem; font-size: 1rem; cursor: pointer; }
  button:hover { background: var(--accent); }
  .divider { color: var(--muted); font-size: .85rem; text-align: center; margin: 1rem 0; }
  .oauth { display: grid; gap: .5rem; }
  .oauth button { background: white; color: var(--fg); border: 1px solid var(--border); }
  .oauth button:hover { background: #f1f5f9; }
  .status { margin-top: 1rem; padding: .75rem; border-radius: .5rem; font-size: .9rem; }
  .status.ok { background: #ecfdf5; color: #065f46; }
  .status.err { background: #fef2f2; color: #991b1b; }
  .signed-in { display: flex; align-items: center; gap: .75rem; padding: 1rem; background: white; border: 1px solid var(--border); border-radius: .5rem; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: grid; place-items: center; font-weight: 600; color: var(--muted); }
  .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
  .who { flex: 1; min-width: 0; }
  .who strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .who small { color: var(--muted); font-size: .8rem; }
  .studios-list { list-style: none; padding: 0; margin: 0; display: grid; gap: .5rem; }
  .studio-card { padding: 1rem; background: white; border: 1px solid var(--border); border-radius: .5rem; }
  .studio-card strong { display: block; }
  .studio-card small { color: var(--muted); font-size: .8rem; }
  .empty { padding: 1rem; background: white; border: 1px dashed var(--border); border-radius: .5rem; color: var(--muted); font-size: .9rem; text-align: center; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<main>
  <h1>studio</h1>
  <p class="lede">Book classes, manage clients, run your studio.</p>

  <section id="signin-view">
    <form id="email-form" autocomplete="on" method="post" action="https://api.freeappstore.online/v1/auth/email/start">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required placeholder="you@studio.com" autocomplete="email">
      <button type="submit">Email me a sign-in link</button>
    </form>

    <div class="divider">or</div>
    <div class="oauth">
      <button type="button" id="btn-google">Continue with Google</button>
      <button type="button" id="btn-github">Continue with GitHub</button>
    </div>

    <div id="status" class="status" hidden></div>
  </section>

  <section id="signed-in-view" hidden>
    <div class="signed-in">
      <div class="avatar" id="avatar"></div>
      <div class="who">
        <strong id="who-name"></strong>
        <small>Signed in to studio</small>
      </div>
      <button type="button" id="btn-signout" style="background:white;color:var(--fg);border:1px solid var(--border);padding:.5rem .75rem">Sign out</button>
    </div>

    <h2>Your studios</h2>
    <div id="studios-empty" class="empty" hidden>
      You don't have any studios yet. Create your first one below.
    </div>
    <ul id="studios-list" class="studios-list" hidden></ul>

    <h2 id="create-heading">Create a studio</h2>
    <form id="create-form" autocomplete="off">
      <label for="studio-name">Studio name</label>
      <input id="studio-name" name="studioName" type="text" required placeholder="Yoga Haus" maxlength="80">
      <div class="row">
        <div style="display:grid;gap:.5rem">
          <label for="studio-tz">Timezone</label>
          <input id="studio-tz" name="timezone" type="text" placeholder="Australia/Sydney" maxlength="40">
        </div>
        <div style="display:grid;gap:.5rem">
          <label for="studio-currency">Currency</label>
          <input id="studio-currency" name="currency" type="text" placeholder="AUD" maxlength="3">
        </div>
      </div>
      <button type="submit">Create studio</button>
    </form>

    <div id="create-status" class="status" hidden></div>
  </section>
</main>

<script type="module">
  const FAS_API = 'https://api.freeappstore.online';
  const STUDIO_API = 'https://studio-api.serge-the-dev.workers.dev';
  const APP_ID = 'studio';
  const SESSION_KEY = 'fas:session';

  const signinView = document.getElementById('signin-view');
  const signedInView = document.getElementById('signed-in-view');
  const status = document.getElementById('status');
  const createStatus = document.getElementById('create-status');
  const avatar = document.getElementById('avatar');
  const whoName = document.getElementById('who-name');
  const studiosList = document.getElementById('studios-list');
  const studiosEmpty = document.getElementById('studios-empty');

  let session = null;

  function flash(el, kind, msg) {
    el.hidden = false;
    el.className = 'status ' + kind;
    el.textContent = msg;
  }
  function clearFlash(el) { el.hidden = true; el.textContent = ''; }

  function returnTo() {
    const here = new URL(window.location.href);
    here.hash = '';
    return here.toString();
  }

  function showSignedIn(user) {
    whoName.textContent = user.login || 'unknown';
    avatar.replaceChildren();
    if (user.avatarUrl) {
      const img = document.createElement('img');
      img.alt = '';
      img.src = user.avatarUrl;
      avatar.appendChild(img);
    } else {
      avatar.textContent = (user.login || '?').slice(0, 1).toUpperCase();
    }
    signinView.hidden = true;
    signedInView.hidden = false;
    loadStudios().catch((err) => flash(createStatus, 'err', String(err)));
  }

  function showSignin() {
    signedInView.hidden = true;
    signinView.hidden = false;
    session = null;
  }

  async function fetchMe(token) {
    const res = await fetch(FAS_API + '/v1/auth/me', {
      headers: { Authorization: 'Bearer ' + token },
    });
    if (!res.ok) throw new Error('auth/me: ' + res.status);
    return await res.json();
  }

  async function dbQuery(sql, params) {
    if (!session) throw new Error('Not signed in.');
    const res = await fetch(STUDIO_API + '/query', {
      method: 'POST',
      headers: {
        Authorization: 'Bearer ' + session.token,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ sql, params: params ?? [] }),
    });
    if (!res.ok) throw new Error('db.query failed: ' + res.status + ' ' + (await res.text()));
    return await res.json();
  }

  async function dbExecute(sql, params) {
    if (!session) throw new Error('Not signed in.');
    const res = await fetch(STUDIO_API + '/execute', {
      method: 'POST',
      headers: {
        Authorization: 'Bearer ' + session.token,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ sql, params: params ?? [] }),
    });
    if (!res.ok) throw new Error('db.execute failed: ' + res.status + ' ' + (await res.text()));
    return await res.json();
  }

  function slugify(name) {
    return name
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '')
      .slice(0, 60);
  }

  async function loadStudios() {
    if (!session) return;
    const { rows } = await dbQuery(
      'SELECT id, slug, name, timezone, currency, created_at FROM studios WHERE owner_user_id = ? ORDER BY created_at DESC',
      [session.user.id],
    );
    renderStudios(rows);
  }

  function renderStudios(rows) {
    studiosList.replaceChildren();
    if (!rows || rows.length === 0) {
      studiosEmpty.hidden = false;
      studiosList.hidden = true;
      return;
    }
    studiosEmpty.hidden = true;
    studiosList.hidden = false;
    for (const r of rows) {
      const li = document.createElement('li');
      li.className = 'studio-card';
      const strong = document.createElement('strong');
      strong.textContent = r.name;
      const small = document.createElement('small');
      small.textContent =
        '/' + r.slug + ' · ' + (r.timezone || 'UTC') + ' · ' + (r.currency || 'AUD');
      li.appendChild(strong);
      li.appendChild(small);
      studiosList.appendChild(li);
    }
  }

  async function capture() {
    const hash = window.location.hash;
    if (hash.startsWith('#fas_session=')) {
      const token = decodeURIComponent(hash.slice('#fas_session='.length));
      history.replaceState(null, '', window.location.pathname + window.location.search);
      try {
        const user = await fetchMe(token);
        session = { token, user };
        localStorage.setItem(SESSION_KEY, JSON.stringify(session));
        showSignedIn(user);
        return;
      } catch (err) {
        flash(status, 'err', 'Sign-in failed: ' + err.message);
        return;
      }
    }
    const cached = localStorage.getItem(SESSION_KEY);
    if (cached) {
      try {
        const parsed = JSON.parse(cached);
        const fresh = await fetchMe(parsed.token);
        session = { token: parsed.token, user: fresh };
        showSignedIn(fresh);
      } catch {
        localStorage.removeItem(SESSION_KEY);
      }
    }
  }
  capture();

  document.getElementById('email-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearFlash(status);
    const email = document.getElementById('email').value.trim();
    if (!email) return;
    try {
      flash(status, 'ok', 'Sending magic link to ' + email + '…');
      const res = await fetch(FAS_API + '/v1/auth/email/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, appId: APP_ID, returnTo: returnTo() }),
      });
      if (!res.ok) {
        const body = await res.text();
        flash(status, 'err', 'Magic link not available: ' + res.status + ' ' + body);
        return;
      }
      flash(status, 'ok', 'Check your inbox — click the link to sign in.');
    } catch (err) {
      flash(status, 'err', String(err));
    }
  });

  function startOAuth(provider) {
    const url = new URL('/v1/auth/' + provider + '/start', FAS_API);
    url.searchParams.set('app_id', APP_ID);
    url.searchParams.set('return_to', returnTo());
    window.location.assign(url.toString());
  }
  document.getElementById('btn-google').addEventListener('click', () => startOAuth('google'));
  document.getElementById('btn-github').addEventListener('click', () => startOAuth('github'));

  document.getElementById('btn-signout').addEventListener('click', () => {
    localStorage.removeItem(SESSION_KEY);
    showSignin();
  });

  document.getElementById('create-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearFlash(createStatus);
    if (!session) return;
    const name = document.getElementById('studio-name').value.trim();
    if (!name) return;
    const timezone = document.getElementById('studio-tz').value.trim() || 'UTC';
    const currency = (document.getElementById('studio-currency').value.trim() || 'AUD').toUpperCase();

    const id = crypto.randomUUID();
    const slug = slugify(name) || id.slice(0, 8);

    try {
      flash(createStatus, 'ok', 'Creating ' + name + '…');
      await dbExecute(
        `INSERT INTO studios (id, slug, name, owner_user_id, timezone, currency, created_at)
         VALUES (?, ?, ?, ?, ?, ?, ?)`,
        [id, slug, name, session.user.id, timezone, currency, Date.now()],
      );
      flash(createStatus, 'ok', 'Created ' + name + '. It now appears in your studios.');
      document.getElementById('create-form').reset();
      await loadStudios();
    } catch (err) {
      const msg = String(err);
      if (msg.includes('UNIQUE constraint failed: studios.slug')) {
        flash(createStatus, 'err', 'A studio with the slug "' + slug + '" already exists — pick a different name.');
      } else {
        flash(createStatus, 'err', msg);
      }
    }
  });
</script>
</body>
</html>
